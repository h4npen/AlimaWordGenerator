<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alima語ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Alima語ジェネレーター</h1>
            <p>Alimaがいかにも言いそうな略語を生成するツール</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="wordInput" placeholder="略したい言葉を入力 (例: セブンイレブン)" autocomplete="off">
                <button id="generateBtn">略す！</button>
            </div>

            <div class="alima-chat-area hidden" id="alimaChatArea">
                <div class="alima-status-tag hidden" id="alimaStatusTag"></div>
                <div class="alima-container">
                    <img src="IMG_7911.jpeg" alt="Alima" class="alima-avatar" id="alimaAvatar">
                    <div class="speech-bubble" id="speechBubble">
                        <div id="thinkingDots" class="thinking-dots hidden">
                            <span></span><span></span><span></span>
                        </div>
                        <span id="resultWord"></span>
                    </div>
                </div>
                <div class="action-buttons hidden" id="actionButtons">
                    <button id="tweetBtn" class="share-btn x-btn">𝕏でシェア</button>
                    <button id="copyBtn" class="share-btn copy-btn">コピー</button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Created by Alima's Friend</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
